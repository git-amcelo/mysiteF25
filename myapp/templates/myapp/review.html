{% extends 'myapp/base.html' %}

{% block title %}Review a Book{% endblock %}

{% block body_block %}
    <h2>Review a Book</h2>
    {% if error_message %}
        <p style="color: red;"><strong>{{ error_message }}</strong></p>
    {% endif %}
    <form action="{% url 'myapp:review' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Submit">
    </form>
{% endblock %}
